[log]

[shared]
gatewaysvc = "{{grpc_address}}"

# Self-sufficient machine-auth revad: the machine auth manager calls the gateway
# (GetUserByClaim). With registry-based discovery and a per-process memory
# registry, this process runs its own gateway co-resident with a userprovider.

[shared.registry]
driver = "memory"

[grpc]
address = "{{grpc_address}}"

[grpc.services.gateway]
authregistrysvc = "{{grpc_address}}"
userprovidersvc = "{{grpc_address}}"

[grpc.services.authregistry]
driver = "static"

[grpc.services.authregistry.drivers.static.rules]
machine = "{{grpc_address}}"

[grpc.services.authprovider]
auth_manager = "machine"

[grpc.services.authprovider.auth_managers.machine]
api_key = "secret"
gateway_addr = "{{grpc_address}}"

[grpc.services.userprovider]
driver = "json"

[grpc.services.userprovider.drivers.json]
users = "fixtures/ocm-users.demo.json"
